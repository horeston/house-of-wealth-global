<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The House of Wealth | High Watt Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #060b11;
        }
        /* Pulls your actual downloaded master image as the immersive layout background */
        .master-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        /* Golden luxury border framework matching the graphic design */
        .gold-frame {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 12px solid #d4af37;
            border-image: linear-gradient(135deg, #aa7c11 0%, #d4af37 50%, #f3e5ab 100%) 12;
            pointer-events: none;
            z-index: 100;
        }
        .interactive-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4rem;
        }
        /* Working link layers mapped precisely over the buttons in your graphic */
        .button-overlay-group {
            position: absolute;
            bottom: 12%;
            display: flex;
            gap: 25px;
        }
        .invisible-cta {
            display: inline-block;
            width: 210px;
            height: 50px;
            cursor: pointer;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s ease;
        }
        .invisible-cta:hover {
            background: rgba(255, 223, 0, 0.15);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        /* Smoothly hovering bird overlay using your exact webp asset match */
        .animated-bird-container {
            position: absolute;
            top: 35%;
            left: 22%;
            width: 180px;
            z-index: 20;
            animation: majesticFloat 8s ease-in-out infinite;
        }
        .animated-bird-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        @keyframes majesticFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-15px, -25px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="master-background"></div>
    <div class="gold-frame"></div>

    <div class="interactive-container">
        <!-- Exact structural alignment matching your bird image filename from the photo -->
        <div class="animated-bird-container">
            <img src="il_1588xN.7859732335_iebv.webp" alt="House of Wealth Hummingbird">
        </div>

        <!-- Hotspots matching the graphic's action links -->
        <div class="button-overlay-group">
            <a href="#services" class="invisible-cta" title="Explore Our Services"></a>
            <a href="#get-started" class="invisible-cta" title="Get Started Now"></a>
        </div>
    </div>

</body>
</html>
