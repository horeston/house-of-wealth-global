<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The House of Wealth | High Watt Solutions</title>
    <style>
        /* Reset & Base Canvas Setup */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Times New Roman', serif; 
        }
        
        body, html {
            height: 100%;
            background-color: #030b1e;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Displays your master background image perfectly across the screen */
        .bg-master-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Gold Outer Frame */
        .bg-master-canvas::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 4px solid #d4af37; 
            pointer-events: none; 
            z-index: 10; 
        }

        /* Interactive Text & Button Layer sitting on top of the image */
        .interactive-overlay {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Navigation Header */
        header { 
            width: 100%; 
            padding: 40px 20px; 
            text-align: center; 
        }
        nav a { 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 1.1rem; 
            margin: 0 15px; 
            letter-spacing: 1.1px; 
            font-weight: bold;
            transition: color 0.3s ease;
        }
        nav a:hover, nav a.active { 
            color: #e5c158; 
            text-shadow: 0 0 10px #e5c158; 
        }
        nav span { 
            color: #d4af37; 
            opacity: 0.5; 
        }

        /* Invisible layout framework to push buttons into perfect position */
        .button-alignment-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding-top: 250px; /* Shifts your buttons downwards to sit exactly below the graphic text */
        }

        /* Interactive Buttons */
        .button-box { 
            display: flex; 
            gap: 25px; 
        }
        .btn { 
            display: inline-block; 
            padding: 14px 35px; 
            font-size: 1rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            text-decoration: none; 
            letter-spacing: 1.5px; 
            border-radius: 30px; 
            transition: all 0.3s ease; 
        }
        .btn-gold { 
            background: linear-gradient(135deg, #d4af37 0%, #aa8214 100%); 
            color: #030b1e; 
            border: 1px solid #e5c158; 
        }
        .btn-gold:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); 
        }
        .btn-outline { 
            background: transparent; 
            color: #ffffff; 
            border: 2px solid #d4af37; 
        }
        .btn-outline:hover { 
            background: rgba(212, 175, 55, 0.15); 
            transform: translateY(-2px); 
        }

        /* Footer Element Configurations */
        footer { 
            width: 100%; 
            padding: 25px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .footer-brand { 
            color: #d4af37; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- This element automatically loads your background.jpg across the entire screen -->
    <div class="bg-master-canvas"></div>

    <!-- This clear overlay layer holds your operational navigation links and buttons -->
    <div class="interactive-overlay">
        <header>
            <nav>
                <a href="#" class="active">Home</a> <span>|</span>
                <a href="#">Services</a> <span>|</span>
                <a href="#">Case Studies</a> <span>|</span>
                <a href="#">About</a> <span>|</span>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main class="button-alignment-zone">
            <div class="button-box">
                <a href="#" class="btn btn-outline">Explore Services</a>
                <a href="#" class="btn btn-gold">Join the Family Now</a>
            </div>
        </main>

        <footer>
            <div class="footer-brand">★ HW ★</div>
            <div class="footer-brand">House of Wealth</div>
            <div class="footer-brand">🪪 ✉ 🌐</div>
        </footer>
    </div>

</body>
</html>
