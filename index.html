
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The House of Wealth | High Watt Solutions</title>
    <style>
        /* Reset and Full-Screen Setup */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Times New Roman', serif; 
        }
        
        body, html {
            height: 100%;
            background-color: #030b1e;
            color: #ffffff;
            overflow: hidden;
        }

        /* The Master Background Image */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Gold Outer Frame */
        .bg-canvas::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 4px solid #d4af37; 
            pointer-events: none; 
            z-index: 10; 
        }

        /* Interactive Overlay for Buttons & Navigation */
        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Navigation Header */
        header { 
            width: 100%; 
            padding: 40px 20px; 
            text-align: center; 
        }
        nav a { 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 1.1rem; 
            margin: 0 15px; 
            letter-spacing: 1.1px; 
            font-weight: bold;
            transition: all 0.3s ease;
        }
        nav a:hover, nav a.active { 
            color: #e5c158; 
            text-shadow: 0 0 10px #e5c158; 
        }
        nav span { 
            color: #d4af37; 
            opacity: 0.5; 
        }

        /* Transparent Center Layout to align with the image text */
        .center-interactive {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding-top: 180px; 
        }

        /* Dynamic Action Buttons with Hover States */
        .button-box { 
            display: flex; 
            gap: 25px; 
        }
        .btn { 
            display: inline-block; 
            padding: 14px 35px; 
            font-size: 1rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            text-decoration: none; 
            letter-spacing: 1.5px; 
            border-radius: 30px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            position: relative;
            overflow: hidden;
        }
        
        /* Gold Button Hover - Glows and expands slightly */
        .btn-gold { 
            background: linear-gradient(135deg, #d4af37 0%, #aa8214 100%); 
            color: #030b1e; 
            border: 1px solid #e5c158; 
        }
        .btn-gold:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); 
            background: linear-gradient(135deg, #e5c158 0%, #d4af37 100%); 
            cursor: pointer;
        }

        /* Outline Button Hover - Fills with a golden tint on hover */
        .btn-outline { 
            background: transparent; 
            color: #ffffff; 
            border: 2px solid #d4af37; 
        }
        .btn-outline:hover { 
            background: rgba(212, 175, 55, 0.2); 
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            cursor: pointer;
        }

        /* --- Dynamic Flying Hummingbird Animation --- */
        .hummingbird {
            position: absolute;
            width: 80px;  /* Size of the flying bird */
            height: auto;
            z-index: 8;   /* Floats above the background, but below the main text overlay */
            pointer-events: none; /* Keeps it from blocking mouse clicks on buttons */
            animation: flightPath 24s infinite ease-in-out;
        }

        /* The 3D flight path across the screen */
        @keyframes flightPath {
            0% {
                top: 70%;
                left: -10%;
                transform: scaleX(1) rotate(5deg);
            }
            25% {
                top: 40%;
                left: 25%;
                transform: scaleX(1) rotate(-5deg) translateY(-10px);
            }
            30% {
                /* Pauses and hovers near the center-left flowers */
                top: 40%;
                left: 25%;
                transform: scaleX(1) rotate(0deg) translateY(0px);
            }
            50% {
                top: 20%;
                left: 55%;
                transform: scaleX(1) rotate(-10deg);
            }
            51% {
                /* Smooth turn to fly back left */
                transform: scaleX(-1) rotate(-10deg);
            }
            75% {
                top: 55%;
                left: 30%;
                transform: scaleX(-1) rotate(10deg);
            }
            90% {
                /* Hovers again */
                top: 65%;
                left: 10%;
                transform: scaleX(-1) rotate(0deg);
            }
            100% {
                top: 70%;
                left: -10%;
                transform: scaleX(1) rotate(5deg);
            }
        }

        /* Footer Strip Overlay */
        footer { 
            width: 100%; 
            padding: 25px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .footer-brand { 
            color: #d4af37; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Sits behind the overlay and displays the main artwork -->
    <div class="bg-canvas"></div>

    <!-- Dynamic flying hummingbird image running on the CSS flightPath script -->
    <img src="hummingbird.png" class="hummingbird" alt="Flying Hummingbird">

    <!-- Active transparent interaction layer -->
    <div class="content-overlay">
        <header>
            <nav>
                <a href="#" class="active">Home</a> <span>|</span>
                <a href="#">Services</a> <span>|</span>
                <a href="#">Case Studies</a> <span>|</span>
                <a href="#">About</a> <span>|</span>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main class="center-interactive">
            <div class="button-box">
                <a href="#" class="btn btn-outline">Explore Services</a>
                <a href="#" class="btn btn-gold">Join the Family Now</a>
            </div>
        </main>

        <footer>
            <div class="footer-brand">★ HW ★</div>
            <div class="footer-brand">House of Wealth</div>
            <div class="footer-brand">🪪 ✉ 🌐</div>
        </footer>
    </div>

</body>
</html>
